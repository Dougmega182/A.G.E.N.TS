[pytest]
# This repository contains many WIP/archived experiments under PROJECTS/.
# Prevent pytest from collecting those as tests (some contain scripts that call exit()).
norecursedirs =
    PROJECTS
    ARCHIVE
    */archive/*
    */archived/*

# Keep default discovery, but avoid surprising imports from non-test scripts.
python_files = test_*.py

# Enable async test support (tests use @pytest.mark.asyncio).
asyncio_mode = auto

